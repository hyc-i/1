<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>我的预约</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="navbar navbar-expand navbar-system">
  <div class="container">
    <a class="navbar-brand" href="index.html">图书馆座位预约</a>
    <div class="d-flex align-items-center gap-3">
      <a class="nav-link" href="index.html">首页</a>
      <a class="nav-link" href="seats.html">选座</a>
      <a class="nav-link active" href="my-reservations.html">我的预约</a>
      <span class="navbar-user">学生 A</span>
    </div>
  </div>
</nav>

<div class="container py-4">
  <h1 class="fw-bold" style="font-size:24px;">我的预约</h1>
  <p class="text-secondary" style="font-size:14px;" id="record-count">共 2 条预约记录</p>

  <!-- Skeleton Loading (hidden) -->
  <div id="skeleton-area" class="d-none">
    <div class="skeleton skeleton-card"></div>
    <div class="skeleton skeleton-card"></div>
  </div>

  <!-- Error State (hidden) -->
  <div id="error-state" class="empty-state d-none">
    <div class="empty-state-icon">&#9888;</div>
    <h5>预约记录加载失败</h5>
    <p>请检查网络后重试</p>
    <button class="btn btn-primary" onclick="location.reload()">重新加载</button>
  </div>

  <!-- Reservation List -->
  <div id="reservation-list">
    <div class="card mt-3">
      <div class="card-body">
        <div class="d-flex justify-content-between align-items-start">
          <div>
            <p class="fw-bold" style="font-size:16px; margin-bottom:4px;">A-01 · 三楼自习区</p>
            <p class="text-secondary" style="font-size:14px; margin-bottom:0;">2026-07-07 09:00 ~ 11:00</p>
          </div>
          <span class="badge-custom badge-pending">待使用</span>
        </div>
        <div class="mt-3">
          <button class="btn btn-danger btn-sm" onclick="cancelReservation(this)">取消预约</button>
        </div>
      </div>
    </div>

    <div class="card mt-3">
      <div class="card-body">
        <div class="d-flex justify-content-between align-items-start">
          <div>
            <p class="fw-bold" style="font-size:16px; margin-bottom:4px;">B-01 · 二楼阅览区</p>
            <p class="text-secondary" style="font-size:14px; margin-bottom:0;">2026-07-05 14:00 ~ 16:00</p>
          </div>
          <span class="badge-custom badge-cancelled">已取消</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Empty State (hidden) -->
  <div id="empty-state" class="empty-state d-none">
    <div class="empty-state-icon">&#128218;</div>
    <h5>暂无预约记录</h5>
    <p>去预约一个座位开始学习吧</p>
    <a href="seats.html" class="btn btn-primary">去预约</a>
  </div>
</div>

<div class="mobile-safe-bottom"></div>

<script>
function cancelReservation(btn) {
  if (!confirm('确定要取消此预约吗？')) return;

  // Simulate API call
  var card = btn.closest('.card');
  var statusBadge = card.querySelector('.badge-custom');
  var actionArea = btn.closest('div');

  // Change status
  statusBadge.className = 'badge-custom badge-cancelled';
  statusBadge.textContent = '已取消';
  actionArea.innerHTML = '<p class="text-secondary" style="font-size:14px; margin-bottom:0;">已取消</p>';

  // Show toast-like feedback
  var toast = document.createElement('div');
  toast.className = 'alert alert-error-custom mt-3';
  toast.textContent = '取消失败，请重试';
  card.appendChild(toast);
  // Actually simulate success in most cases
  toast.textContent = '预约已取消';
  toast.className = 'alert alert-success-custom mt-3';
}

// Toggle empty state (uncomment to test)
// document.getElementById('reservation-list').classList.add('d-none');
// document.getElementById('empty-state').classList.remove('d-none');
// document.getElementById('record-count').textContent = '暂无预约记录';
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
