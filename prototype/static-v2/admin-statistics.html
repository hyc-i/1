<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>数据统计 — 管理员</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="admin-topbar">
  <button class="btn btn-sm btn-outline-primary d-md-none me-3" onclick="toggleSidebar()">&#9776;</button>
  <span class="fw-bold" style="font-size:20px; color:var(--color-primary);">座位预约管理</span>
  <div class="ms-auto d-flex align-items-center gap-3">
    <span class="text-secondary" style="font-size:14px;">管理员</span>
    <a href="admin-login.html" class="text-decoration-none" style="font-size:14px; color:var(--color-gray-500);">退出</a>
  </div>
</div>

<div class="admin-layout">
  <aside class="admin-sidebar" id="adminSidebar">
    <a href="admin-reservations.html" class="nav-link">预约管理</a>
    <a href="admin-seats.html" class="nav-link">座位管理</a>
    <a href="admin-statistics.html" class="nav-link active">数据统计</a>
  </aside>
  <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

  <main class="admin-content">
    <div class="page-header">
      <h1>数据统计</h1>
      <p class="page-subtitle">图书馆座位使用概况</p>
    </div>

    <!-- Skeleton Loading (hidden) -->
    <div id="stat-skeleton" class="d-none">
      <div class="stat-grid-2x2">
        <div class="skeleton skeleton-stat"></div>
        <div class="skeleton skeleton-stat"></div>
        <div class="skeleton skeleton-stat"></div>
        <div class="skeleton skeleton-stat"></div>
      </div>
    </div>

    <!-- Stat Cards -->
    <div id="stat-cards" class="stat-grid-2x2">
      <div class="card stat-card">
        <div class="stat-label">总座位数</div>
        <div class="stat-number" style="color:var(--color-primary);">42</div>
        <div class="stat-label" style="margin-top:8px; font-size:12px;">全部座位</div>
      </div>
      <div class="card stat-card">
        <div class="stat-label">今日预约数</div>
        <div class="stat-number" style="color:var(--color-success);">18</div>
        <div class="stat-label" style="margin-top:8px; font-size:12px;">2026-07-07</div>
      </div>
      <div class="card stat-card">
        <div class="stat-label">座位利用率</div>
        <div class="stat-number" style="color:var(--color-info);">43%</div>
        <div class="stat-label" style="margin-top:8px; font-size:12px;">今日有预约座位 / 总座位</div>
      </div>
      <div class="card stat-card">
        <div class="stat-label">热门区域</div>
        <div class="stat-number" style="color:var(--color-warning); font-size:28px;">三楼自习区</div>
        <div class="stat-label" style="margin-top:8px; font-size:12px;">今日预约次数最多的区域</div>
      </div>
    </div>

    <!-- Error State (hidden) -->
    <div id="stat-error" class="alert alert-error-custom d-none mt-4" role="alert">
      统计数据暂时不可用。
      <button class="btn btn-sm btn-outline-primary ms-3" onclick="location.reload()">重新加载</button>
    </div>

    <!-- Additional Stats Section -->
    <div class="card mt-4">
      <div class="card-body">
        <p class="card-title-custom">今日状态分布</p>
        <div class="row g-3">
          <div class="col-6">
            <div style="background:var(--color-gray-100); border-radius:var(--radius-sm); padding:16px; text-align:center;">
              <div style="font-size:14px; color:var(--color-gray-500);">空闲</div>
              <div class="fw-bold" style="font-size:24px; color:var(--color-success);">12</div>
            </div>
          </div>
          <div class="col-6">
            <div style="background:var(--color-gray-100); border-radius:var(--radius-sm); padding:16px; text-align:center;">
              <div style="font-size:14px; color:var(--color-gray-500);">已预约</div>
              <div class="fw-bold" style="font-size:24px; color:var(--color-warning);">30</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>

<script>
function toggleSidebar() {
  document.getElementById('adminSidebar').classList.toggle('show');
  document.getElementById('sidebarOverlay').classList.toggle('show');
}
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
