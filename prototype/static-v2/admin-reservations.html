<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>预约管理 — 管理员</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- Admin Top Bar -->
<div class="admin-topbar">
  <button class="btn btn-sm btn-outline-primary d-md-none me-3" id="sidebarToggle" onclick="toggleSidebar()">&#9776;</button>
  <span class="fw-bold" style="font-size:20px; color:var(--color-primary);">座位预约管理</span>
  <div class="ms-auto d-flex align-items-center gap-3">
    <span class="text-secondary" style="font-size:14px;">管理员</span>
    <a href="admin-login.html" class="text-decoration-none" style="font-size:14px; color:var(--color-gray-500);">退出</a>
  </div>
</div>

<div class="admin-layout">
  <!-- Sidebar -->
  <aside class="admin-sidebar" id="adminSidebar">
    <a href="admin-reservations.html" class="nav-link active">预约管理</a>
    <a href="admin-seats.html" class="nav-link">座位管理</a>
    <a href="admin-statistics.html" class="nav-link">数据统计</a>
  </aside>

  <!-- Overlay for mobile sidebar -->
  <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

  <!-- Content -->
  <main class="admin-content">
    <div class="page-header">
      <h1>预约管理</h1>
      <p class="page-subtitle">查看和管理所有学生的预约记录</p>
    </div>

    <!-- Filter Bar -->
    <div class="filter-bar">
      <select class="form-select">
        <option>全部状态</option>
        <option>待使用</option>
        <option>使用中</option>
        <option>已取消</option>
      </select>
      <select class="form-select">
        <option>全部日期</option>
        <option>今天</option>
        <option>本周</option>
        <option>本月</option>
      </select>
      <input type="text" class="form-control" placeholder="搜索座位号 / 学号" style="min-width:200px;">
    </div>

    <!-- Skeleton Loading (hidden) -->
    <div id="table-skeleton" class="d-none">
      <div class="skeleton skeleton-table w-100"></div>
      <div class="skeleton skeleton-table w-100"></div>
      <div class="skeleton skeleton-table w-100"></div>
    </div>

    <!-- Reservation Table -->
    <div class="table-responsive">
      <table class="table-custom" id="reservation-table">
        <thead>
          <tr>
            <th>座位号</th>
            <th>学号</th>
            <th>学生姓名</th>
            <th>日期</th>
            <th>时段</th>
            <th>状态</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>A-01</td><td>S2024001</td><td>张三</td>
            <td>2026-07-07</td><td>09:00-11:00</td>
            <td><span class="badge-custom badge-sm badge-pending">待使用</span></td>
            <td class="actions"><button class="btn btn-danger btn-sm" onclick="confirmCancel(this)">取消</button></td>
          </tr>
          <tr>
            <td>B-03</td><td>S2024005</td><td>李四</td>
            <td>2026-07-07</td><td>10:00-12:00</td>
            <td><span class="badge-custom badge-sm badge-available" style="background:var(--color-info-bg);color:var(--color-info-text);">使用中</span></td>
            <td class="actions"><button class="btn btn-danger btn-sm" onclick="confirmCancel(this)">取消</button></td>
          </tr>
          <tr>
            <td>C-02</td><td>S2024003</td><td>王五</td>
            <td>2026-07-06</td><td>14:00-16:00</td>
            <td><span class="badge-custom badge-sm badge-cancelled">已取消</span></td>
            <td class="actions">—</td>
          </tr>
          <tr>
            <td>A-04</td><td>S2024001</td><td>张三</td>
            <td>2026-07-08</td><td>09:00-10:00</td>
            <td><span class="badge-custom badge-sm badge-pending">待使用</span></td>
            <td class="actions"><button class="btn btn-danger btn-sm" onclick="confirmCancel(this)">取消</button></td>
          </tr>
        </tbody>
      </table>
    </div>

    <!-- Empty State (hidden) -->
    <div id="empty-state" class="empty-state d-none">
      <div class="empty-state-icon">&#128203;</div>
      <h5>暂无预约记录</h5>
      <p>当学生提交预约后，记录将显示在此处。</p>
    </div>
  </main>
</div>

<script>
function toggleSidebar() {
  document.getElementById('adminSidebar').classList.toggle('show');
  document.getElementById('sidebarOverlay').classList.toggle('show');
}

function confirmCancel(btn) {
  if (!confirm('确定要取消此预约吗？')) return;
  var row = btn.closest('tr');
  var statusCell = row.querySelector('td:nth-child(6)');
  statusCell.innerHTML = '<span class="badge-custom badge-sm badge-cancelled">已取消</span>';
  btn.disabled = true;
  btn.textContent = '已取消';
  btn.classList.remove('btn-danger');
  btn.classList.add('btn-disabled');
}
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
