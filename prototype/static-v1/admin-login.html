<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理员登录</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="login-wrapper">
  <div class="login-card">
    <h1>座位预约管理</h1>

    <!-- Error alert (hidden) -->
    <div id="login-error" class="alert alert-error-custom d-none" role="alert">
      账号或密码不正确，请重新输入。
    </div>

    <form onsubmit="return handleLogin(event)">
      <div class="mb-3">
        <label class="form-label" for="username">管理员账号</label>
        <input type="text" class="form-control" id="username" placeholder="请输入管理员账号" value="admin">
      </div>
      <div class="mb-3">
        <label class="form-label" for="password">密码</label>
        <input type="password" class="form-control" id="password" placeholder="请输入密码" value="123456">
      </div>
      <button type="submit" class="btn btn-primary w-100 btn-lg">登录</button>
    </form>

    <p class="text-center text-secondary mt-3" style="font-size:14px;">
      <a href="index.html" class="text-decoration-none" style="color:var(--color-primary);">&larr; 返回学生首页</a>
    </p>
  </div>
</div>

<script>
function handleLogin(e) {
  e.preventDefault();
  var username = document.getElementById('username').value;
  var password = document.getElementById('password').value;
  var errorAlert = document.getElementById('login-error');

  // Simulate login check
  if (username === 'admin' && password === '123456') {
    window.location.href = 'admin-reservations.html';
  } else {
    errorAlert.classList.remove('d-none');
  }
  return false;
}
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
