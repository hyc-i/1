<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>提交预约</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="navbar navbar-expand navbar-system">
  <div class="container">
    <a class="navbar-brand" href="index.html">图书馆座位预约</a>
    <span class="navbar-user">学生 A</span>
  </div>
</nav>

<div class="container py-4">
  <a href="seat-detail.html" class="text-decoration-none text-secondary" style="font-size:14px;">&larr; 返回</a>
  <h1 class="fw-bold mt-2" style="font-size:24px;">确认预约</h1>

  <!-- Seat Summary -->
  <div class="card mt-3">
    <div class="card-body">
      <div class="d-flex justify-content-between align-items-center">
        <div>
          <p class="fw-bold" style="font-size:18px; margin-bottom:4px;">A-01</p>
          <p class="text-secondary" style="font-size:14px; margin-bottom:0;">三楼自习区 · 靠窗、有插座</p>
        </div>
        <span class="badge-custom badge-available">空闲</span>
      </div>
    </div>
  </div>

  <!-- Time Info -->
  <div class="card mt-3">
    <div class="card-body">
      <div class="mb-3">
        <label class="form-label">日期</label>
        <input type="date" class="form-control" id="reserve-date" value="2026-07-07">
      </div>
      <div class="row g-3">
        <div class="col-6">
          <label class="form-label">开始时间</label>
          <input type="time" class="form-control" id="start-time" value="09:00">
        </div>
        <div class="col-6">
          <label class="form-label">结束时间</label>
          <input type="time" class="form-control" id="end-time" value="11:00">
        </div>
      </div>
    </div>
  </div>

  <!-- Conflict Error Area (hidden) -->
  <div id="conflict-error" class="alert alert-error-custom d-none mt-3" role="alert">
    该时段已被预约，请选择其他时段。
  </div>

  <!-- Past time error (hidden) -->
  <div id="past-error" class="alert alert-error-custom d-none mt-3" role="alert">
    不能预约过去的时间，请重新选择。
  </div>

  <!-- Form Validation Summary -->
  <div class="card mt-3" style="background:var(--color-primary-light);">
    <div class="card-body">
      <p class="text-secondary" style="font-size:14px; margin-bottom:0;">
        <strong>请确认：</strong>
        <span id="confirm-text">A-01 · 2026-07-07 09:00 ~ 11:00</span>
      </p>
    </div>
  </div>

  <!-- Actions -->
  <div class="d-flex gap-3 mt-4">
    <a href="seat-detail.html" class="btn btn-outline-primary flex-fill">修改</a>
    <button class="btn btn-primary flex-fill" onclick="submitReservation()">确认预约</button>
  </div>

  <!-- Success State (hidden) -->
  <div id="success-state" class="alert alert-success-custom d-none mt-3 text-center" role="alert">
    预约成功！正在跳转到我的预约页...
  </div>
</div>

<div class="mobile-safe-bottom"></div>

<script>
function submitReservation() {
  var conflictErr = document.getElementById('conflict-error');
  var pastErr = document.getElementById('past-error');
  var success = document.getElementById('success-state');

  // Hide all alerts
  conflictErr.classList.add('d-none');
  pastErr.classList.add('d-none');

  // Simulate conflict detection (toggle comment to test conflict)
  var hasConflict = false;
  // hasConflict = true; // uncomment to test conflict error

  var dateVal = document.getElementById('reserve-date').value;
  var startVal = document.getElementById('start-time').value;
  var endVal = document.getElementById('end-time').value;

  // Past time check
  if (dateVal === '2026-07-07' && startVal < '08:00') {
    // Simulate past time (time before now)
  }

  if (hasConflict) {
    conflictErr.classList.remove('d-none');
    window.scrollTo(0, 0);
    return;
  }

  // Simulate success
  success.classList.remove('d-none');
  document.getElementById('confirm-text').innerText = 'A-01 · ' + dateVal + ' ' + startVal + ' ~ ' + endVal;

  // Auto-redirect after 2 seconds
  setTimeout(function() {
    window.location.href = 'my-reservations.html';
  }, 2000);
}

// Update confirm text on change
['reserve-date', 'start-time', 'end-time'].forEach(function(id) {
  document.getElementById(id).addEventListener('change', function() {
    var d = document.getElementById('reserve-date').value;
    var s = document.getElementById('start-time').value;
    var e = document.getElementById('end-time').value;
    document.getElementById('confirm-text').innerText = 'A-01 · ' + d + ' ' + s + ' ~ ' + e;
  });
});
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
